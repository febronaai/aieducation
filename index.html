<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0e0e16; --nav:#13131f; --surface:#181828; --raised:#1e1e32;
  --border:#2a2a44; --border2:#3a3a5c; --accent:#6c5ce7; --accent-l:#9d94f0;
  --accent-d:#3d3680; --white:#eceaf8; --muted:#8884b0; --faint:#3e3c60;
  --green:#4ade80; --mono:'IBM Plex Mono',monospace; --pixel:'Press Start 2P',monospace;
}
html { scroll-behavior: smooth; }
body { font-family: var(--mono); background: var(--bg); color: var(--white); min-height: 100vh; font-size: 14px; line-height: 1.7; }

.site-header { background: var(--nav); border-bottom: 2px solid var(--accent); padding: 1.25rem 2rem 1rem; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
.wordmark { display: flex; flex-direction: row; align-items: center; gap: 16px; }
.logo-unit { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.logo-label { font-family: var(--pixel); font-size: 6px; color: var(--accent-l); letter-spacing: 0.1em; line-height: 1; }
.wordmark-icon { width: 36px; height: 36px; }
.site-title { font-family: var(--pixel); font-size: 9px; color: var(--accent-l); letter-spacing: 0.08em; line-height: 1.6; }
.site-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.12em; margin-top: 2px; }
.header-badges { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.badge { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; padding: 4px 10px; border: 1px solid var(--border2); color: var(--muted); background: var(--surface); }
.badge.accent { border-color: var(--accent); color: var(--accent-l); background: rgba(108,92,231,0.1); }
.filter-row { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.filter-label { font-size: 10px; color: var(--faint); letter-spacing: 0.12em; margin-right: 6px; }
.filter-btn { font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; padding: 5px 14px; background: transparent; color: var(--muted); border: 1px solid var(--border); cursor: pointer; transition: all 0.1s; }
.filter-btn:hover { border-color: var(--accent-d); color: var(--white); }
.filter-btn.active { border-color: var(--accent); color: var(--accent-l); background: rgba(108,92,231,0.12); }

.main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }

.generate-panel { border: 1px solid var(--accent-d); background: rgba(108,92,231,0.06); margin-bottom: 2rem; }
.generate-header { padding: 14px 18px 10px; border-bottom: 1px solid var(--accent-d); }
.generate-title { font-family: var(--pixel); font-size: 7px; color: var(--accent-l); letter-spacing: 0.1em; line-height: 1.8; margin-bottom: 4px; }
.generate-sub { font-size: 12px; color: var(--muted); }
.generate-body { padding: 14px 18px 18px; }
.generate-form { display: flex; gap: 8px; flex-wrap: wrap; }
.generate-input { flex: 1; min-width: 200px; font-family: var(--mono); font-size: 13px; color: var(--white); background: var(--surface); border: 1px solid var(--border2); padding: 9px 14px; outline: none; transition: border-color 0.1s; }
.generate-input::placeholder { color: var(--faint); }
.generate-input:focus { border-color: var(--accent); }
.generate-btn { font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; padding: 9px 18px; background: transparent; color: var(--accent-l); border: 1px solid var(--accent); cursor: pointer; transition: all 0.1s; white-space: nowrap; }
.generate-btn:hover { background: rgba(108,92,231,0.15); }
.generate-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.generate-btn::before { content: '[ '; }
.generate-btn::after { content: ' ]'; }
.suggestion-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; align-items: center; }
.suggestion-chip { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; padding: 4px 10px; border: 1px solid var(--border); color: var(--muted); background: transparent; cursor: pointer; transition: all 0.1s; }
.suggestion-chip:hover { border-color: var(--accent-d); color: var(--white); }

.generating-card { border: 1px solid var(--accent-d); background: var(--raised); padding: 24px 18px; text-align: center; margin-bottom: 8px; display: none; }
.generating-label { font-family: var(--pixel); font-size: 7px; color: var(--accent-l); letter-spacing: 0.12em; line-height: 1.8; margin-bottom: 8px; }
.generating-dots { display: inline-flex; gap: 6px; }
.generating-dots span { width: 6px; height: 6px; background: var(--accent); animation: blink 1.2s infinite; }
.generating-dots span:nth-child(2) { animation-delay: 0.2s; }
.generating-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0.15} 40%{opacity:1} }
.generating-concept { font-size: 12px; color: var(--muted); margin-top: 6px; letter-spacing: 0.06em; }

.error-card { border: 1px solid #e74c3c; background: rgba(231,76,60,0.07); padding: 14px 18px; margin-bottom: 8px; display: none; font-size: 13px; color: #e74c3c; }

.deck-label { font-size: 10px; letter-spacing: 0.18em; color: var(--faint); margin-bottom: 1.2rem; display: flex; align-items: center; gap: 12px; }
.deck-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.cards { display: flex; flex-direction: column; gap: 8px; }

.card { border: 1px solid var(--border); background: var(--surface); transition: border-color 0.12s; }
.card:hover { border-color: var(--border2); }
.card.open { border-color: var(--accent); background: var(--raised); }
.card.generated { border-color: var(--accent-d); }
.card.generated.open { border-color: var(--accent); }
.card-header { display: flex; align-items: center; gap: 16px; padding: 14px 18px; cursor: pointer; user-select: none; }
.card-icon { width: 28px; height: 28px; flex-shrink: 0; color: var(--muted); transition: color 0.12s; }
.card.open .card-icon { color: var(--accent-l); }
.card-meta { flex: 1; min-width: 0; }
.card-title { font-family: var(--pixel); font-size: 7px; color: var(--white); letter-spacing: 0.08em; line-height: 1.8; margin-bottom: 2px; }
.card.open .card-title { color: var(--accent-l); }
.card-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.04em; }
.new-badge { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; color: var(--accent-l); background: rgba(108,92,231,0.12); border: 1px solid var(--accent-d); padding: 1px 7px; margin-left: 8px; vertical-align: middle; }
.chevron { width: 16px; height: 16px; color: var(--faint); transition: transform 0.15s, color 0.12s; flex-shrink: 0; }
.card.open .chevron { transform: rotate(90deg); color: var(--accent-l); }

.card-body { display: none; border-top: 1px solid var(--border); padding: 18px 18px 20px; }
.card.open .card-body { display: block; border-top-color: var(--accent-d); }
.analogy-list { list-style: none; margin-bottom: 1rem; }
.analogy-list li { display: flex; gap: 14px; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; line-height: 1.6; }
.analogy-list li:first-child { padding-top: 0; }
.analogy-list li:last-child { border-bottom: none; padding-bottom: 0; }
.item-label { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; color: var(--accent-l); background: rgba(108,92,231,0.12); border: 1px solid var(--accent-d); padding: 2px 8px; white-space: nowrap; flex-shrink: 0; line-height: 1.8; }
.item-text { color: var(--white); }
.callout { border-left: 3px solid var(--accent); background: rgba(108,92,231,0.07); padding: 10px 14px; margin: 1rem 0; }
.callout-label { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; color: var(--accent-l); margin-bottom: 5px; }
.callout-text { font-size: 14px; color: var(--muted); line-height: 1.6; }
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 1rem 0 1.2rem; }
.tag { font-size: 10px; letter-spacing: 0.08em; color: var(--faint); border: 1px solid var(--border); padding: 2px 9px; }
.copy-btn { font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; padding: 7px 16px; background: transparent; color: var(--muted); border: 1px solid var(--border2); cursor: pointer; transition: all 0.1s; display: inline-flex; align-items: center; gap: 8px; }
.copy-btn:hover { border-color: var(--accent); color: var(--accent-l); background: rgba(108,92,231,0.08); }
.copy-btn.ok { border-color: var(--green); color: var(--green); }

.footer { text-align: center; padding: 2rem; font-size: 10px; letter-spacing: 0.14em; color: var(--faint); border-top: 1px solid var(--border); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--accent-d); }
@media (max-width: 600px) {
  .site-header { padding: 1rem; }
  .main { padding: 1rem 1rem 4rem; }
  .card-title { font-size: 6px; }
}

.action-row { display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap; }
.action-btn { font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; padding: 7px 16px; background: transparent; border: 1px solid var(--border2); cursor: pointer; transition: all 0.1s; display: inline-flex; align-items: center; gap: 8px; }
.action-btn.keep { color: var(--green); border-color: var(--green); }
.action-btn.keep:hover { background: rgba(74,222,128,0.1); }
.action-btn.regen { color: var(--accent-l); border-color: var(--accent); }
.action-btn.regen:hover { background: rgba(108,92,231,0.12); }
.action-btn.discard { color: var(--muted); border-color: var(--border2); }
.action-btn.discard:hover { border-color: #e74c3c; color: #e74c3c; }
.card.pending { border-color: var(--accent); background: var(--raised); border-style: dashed; }
.pending-notice { font-size: 10px; letter-spacing: 0.1em; color: var(--accent-l); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.pending-notice::before { content: '▶'; font-size: 8px; }
.saved-badge { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; color: var(--green); background: rgba(74,222,128,0.1); border: 1px solid var(--green); padding: 1px 7px; margin-left: 8px; vertical-align: middle; }

.eli5-block { border: 1px solid #f472b6; background: rgba(244,114,182,0.04); margin-top: 1rem; display: none; }
.eli5-block.visible { display: block; }
.eli5-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; border-bottom: 1px solid var(--border); }
.eli5-label { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; color: #f472b6; }
.eli5-toggle { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; color: var(--faint); background: transparent; border: none; cursor: pointer; padding: 0; }
.eli5-toggle:hover { color: var(--white); }
.eli5-content { padding: 12px 14px; font-size: 14px; color: var(--muted); line-height: 1.7; }
.eli5-dots { display: inline-flex; gap: 4px; margin-left: 8px; vertical-align: middle; }
.eli5-dots span { width: 4px; height: 4px; background: #f472b6; animation: blink 1.2s infinite; }
.eli5-dots span:nth-child(2) { animation-delay: 0.2s; }
.eli5-dots span:nth-child(3) { animation-delay: 0.4s; }
.eli5-btn { font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; padding: 7px 16px; background: transparent; color: #f472b6; border: 1px solid #f472b6; cursor: pointer; transition: all 0.1s; display: inline-flex; align-items: center; gap: 8px; }
.eli5-btn:hover { background: rgba(244,114,182,0.08); }
.eli5-btn:disabled { opacity: 0.45; cursor: not-allowed; }
</style>
</head>

<script>
async function loadSaved() {
  try {
    const result = await window.storage.get('saved-analogies');
    return result ? JSON.parse(result.value) : [];
  } catch(e) { return []; }
}

async function persistSaved(saved) {
  try {
    await window.storage.set('saved-analogies', JSON.stringify(saved));
  } catch(e) { console.error('Storage error', e); }
}

const ICONS = {

  robot:`<svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="10" width="16" height="12" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="6" width="8" height="6" stroke="currentColor" stroke-width="1.5"/><circle cx="11" cy="16" r="1.5" stroke="currentColor" stroke-width="1.5"/><circle cx="17" cy="16" r="1.5" stroke="currentColor" stroke-width="1.5"/><line x1="11" y1="19" x2="17" y2="19" stroke="currentColor" stroke-width="1.5"/><line x1="14" y1="6" x2="14" y2="4" stroke="currentColor" stroke-width="1.5"/><circle cx="14" cy="3" r="1" fill="currentColor"/><line x1="2" y1="14" x2="6" y2="14" stroke="currentColor" stroke-width="1.5"/><line x1="22" y1="14" x2="26" y2="14" stroke="currentColor" stroke-width="1.5"/></svg>`,

};

const baseAnalogies = [
  { iconKey:"car", title:"CAR", sub:"The classic intro analogy", filters:["fundamentals"], items:[{label:"DATA",text:"is the fuel — without it, nothing moves."},{label:"MODEL",text:"is the engine — the core mechanism doing the work."},{label:"TRAINING",text:"is tuning the engine so it runs smoothly."},{label:"INPUT",text:"is you behind the wheel — you steer the direction."},{label:"OUTPUT",text:"is the car getting you where you're trying to go."}], insight:"A powerful engine on bad fuel still breaks down. Quality data matters as much as model architecture.", tags:["#ai/fundamentals","#ai/analogies"] },
  { iconKey:"recipe", title:"RECIPE", sub:"Great for non-technical audiences", filters:["fundamentals"], items:[{label:"DATA",text:"is the set of recipes — accumulated knowledge the AI learns from."},{label:"MODEL",text:"is the chef — trained to read patterns and produce results."},{label:"TRAINING",text:"is culinary school — thousands of hours of practice on past dishes."},{label:"PROMPT",text:"is the order you place — specifics shape what you get."},{label:"OUTPUT",text:"is the dish — good prompts lead to better meals."}], insight:"The chef can't invent an ingredient they've never seen. AI can't reason about things outside its training data.", tags:["#ai/fundamentals","#ai/analogies"] },
  { iconKey:"music", title:"JAZZ MUSICIAN", sub:"How generative AI actually works", filters:["llm"], items:[{label:"TRAINING DATA",text:"is every song they've ever heard and studied."},{label:"MODEL",text:"is their musical intuition — internalized patterns, not memorized songs."},{label:"PROMPT",text:"is the key and tempo you call out before they play."},{label:"OUTPUT",text:"is the improvisation — novel, built from deep pattern recognition."},{label:"TEMPERATURE",text:"is how adventurous their solo gets."}], insight:"Jazz musicians don't replay recordings — they generate new music from absorbed patterns. LLMs work the same way: generating token by token, not retrieving stored text.", tags:["#ai/generative","#ai/llm","#ai/analogies"] },
  { iconKey:"map", title:"CITY & GPS", sub:"Knowledge cutoffs and hallucination", filters:["llm"], items:[{label:"TRAINING DATA",text:"is the map — drawn at a point in time, may have outdated roads."},{label:"MODEL",text:"is the GPS — navigates using that map confidently."},{label:"CUTOFF",text:"is when the map was last printed — new buildings won't appear."},{label:"RAG",text:"is a live traffic feed layered on top of the old map."},{label:"HALLUCINATION",text:"is confidently routing you down a road that no longer exists."}], insight:"Confidence does not equal accuracy. AI speaks fluently even when its map is wrong. Always verify high-stakes outputs.", tags:["#ai/limitations","#ai/rag","#ai/analogies"] },
  { iconKey:"plant", title:"PLANT & SUNLIGHT", sub:"Fine-tuning and specialization", filters:["training"], items:[{label:"PRE-TRAINED",text:"is a mature plant in general soil — robust, adaptable."},{label:"FINE-TUNE DATA",text:"is specialized fertilizer — shapes growth in a specific direction."},{label:"OVERFITTING",text:"is forcing the plant into a tiny pot — it stops being flexible."},{label:"YOUR DOMAIN",text:"is the climate — the plant thrives where conditions match its training."},{label:"INFERENCE",text:"is harvesting — you pick the fruit the plant learned to produce."}], insight:"Fine-tuning doesn't rebuild the plant from seed. It nudges an already-capable model toward a specific task.", tags:["#ai/fine-tuning","#ai/training","#ai/analogies"] },
  { iconKey:"employee", title:"NEW EMPLOYEE", sub:"Prompt engineering", filters:["fundamentals"], items:[{label:"MODEL",text:"is a brilliant new hire — capable but unfamiliar with your context."},{label:"PROMPT",text:"is the briefing — vague instructions produce vague work."},{label:"SYSTEM PROMPT",text:"is the job description and company culture doc."},{label:"FEW-SHOT",text:"is showing them three past examples of exactly what you want."},{label:"CHAIN-OF-THOUGHT",text:"is asking them to show their working before giving the final answer."}], insight:"You wouldn't hire someone exceptional and give them zero context. Prompt quality directly determines output quality.", tags:["#ai/prompting","#ai/fundamentals","#ai/analogies"] },
  { iconKey:"robot", title:"AI AGENT", sub:"Agentic AI behaviour", filters:["llm"], items:[{label:"GOAL",text:"is the brief — the clearer it is, the better the result."},{label:"TOOLS",text:"(web search, code, APIs) are the resources on their desk."},{label:"PLANNING",text:"is breaking the project into steps before diving in."},{label:"MEMORY",text:"is the notepad — short-term during the task, long-term across sessions."},{label:"HUMAN CHECK",text:"is reviewing before they send the email or submit the PR."}], insight:"Autonomy is powerful but risky without checkpoints. The best agentic setups keep humans in the loop for high-stakes actions.", tags:["#ai/agents","#ai/autonomy","#ai/analogies"] },
  { iconKey:"mirror", title:"WARPED MIRROR", sub:"AI bias & fairness", filters:["safety"], items:[{label:"TRAINING DATA",text:"is the mirror's surface — shaped by who made it and what it reflected."},{label:"BIASED DATA",text:"means the mirror distorts certain faces more than others."},{label:"MODEL",text:"faithfully reflects the distortions — it doesn't know they're there."},{label:"AUDITING",text:"is holding up a ruler to check whether the mirror is flat."},{label:"DEBIASING",text:"is grinding the surface down — slow, imperfect, but essential."}], insight:"AI doesn't invent bias from nothing — it amplifies what's already in the data. Garbage in, garbage out, at scale.", tags:["#ai/bias","#ai/fairness","#ai/ethics","#ai/analogies"] },
  { iconKey:"whiteboard", title:"WHITEBOARD", sub:"Context windows & memory", filters:["llm"], items:[{label:"EACH TURN",text:"writes more onto the whiteboard."},{label:"CONTEXT LIMIT",text:"is the size of the board — once full, older notes get erased."},{label:"MODEL",text:"can only reason about what's currently on the board."},{label:"LONG CONTEXT",text:"is a bigger whiteboard — not infinite memory."},{label:"RAG",text:"is pinning photographs of previous whiteboards back up when needed."}], insight:"LLMs don't have memory between sessions by default. Everything they know about your conversation lives only on the current whiteboard.", tags:["#ai/llm","#ai/context-window","#ai/rag","#ai/analogies"] },
  { iconKey:"pin", title:"MAP OF MEANING", sub:"Embeddings & semantic search", filters:["llm"], items:[{label:"EVERY WORD",text:"gets plotted as a point on a vast invisible map."},{label:"PROXIMITY",text:"reflects similarity — 'cat' and 'kitten' land close together."},{label:"DISTANCE",text:"reflects difference — 'cat' and 'interest rate' are far apart."},{label:"SEMANTIC SEARCH",text:"is asking 'show me everything near this point' instead of matching keywords."},{label:"MODEL",text:"navigates this map to understand relationships, not just words."}], insight:"This is why AI can find 'a four-legged furry pet' when you search 'cat' — it understands meaning, not just spelling.", tags:["#ai/embeddings","#ai/vectors","#ai/semantic-search","#ai/analogies"] },
  { iconKey:"compass", title:"POWERFUL GENIE", sub:"AI alignment & safety", filters:["safety"], items:[{label:"CAPABILITY",text:"is how many wishes the genie can grant — rapidly growing."},{label:"ALIGNMENT",text:"is ensuring the genie grants what you meant, not just what you said."},{label:"MISALIGNMENT",text:"is 'make me rich' solved by robbing a bank — technically correct, deeply wrong."},{label:"RLHF",text:"is teaching the genie which wishes lead to outcomes humans actually like."},{label:"CORRIGIBILITY",text:"is the genie accepting 'stop, that's not what I meant' — harder than it sounds."}], insight:"The harder alignment problem isn't whether AI will be evil — it's whether AI will be precisely, reliably good at understanding what we actually value.", tags:["#ai/alignment","#ai/safety","#ai/rlhf","#ai/analogies"] },
  { iconKey:"eye", title:"DETECTIVE", sub:"Multimodal AI", filters:["fundamentals"], items:[{label:"TEXT-ONLY",text:"is a detective who only reads case files — powerful, but limited."},{label:"VISION",text:"adds the ability to examine the crime scene photograph directly."},{label:"AUDIO",text:"lets them listen to the witness recording, not just read a transcript."},{label:"MULTIMODAL",text:"is connecting clues across all senses to build one coherent picture."},{label:"YOUR INPUT",text:"can now be a photo, a voice note, a document — not just typed words."}], insight:"Multimodal doesn't mean the model has separate modes — at its best it reasons across all inputs simultaneously, the way humans naturally do.", tags:["#ai/multimodal","#ai/vision","#ai/fundamentals","#ai/analogies"] }
];

let allAnalogies = [...baseAnalogies];
let savedAnalogies = [];
let pendingAnalogy = null;
let pendingConcept = null;
let activeFilter = 'all';

function updateCounts() {
  const total = allAnalogies.length;
  document.getElementById('entry-count').textContent = total + ' ENTRIES';
  document.getElementById('footer-count').textContent = total + ' LOADED';
}

function cardHTML(a, idx) {
  const isPending = a.pending;
  const isSaved = a.saved;
  const isGenerated = a.generated && !a.saved;
  let cls = 'card';
  if (isPending) cls += ' pending';
  else if (isGenerated) cls += ' generated';

  let badge = '';
  if (isPending) badge = '<span class="new-badge" style="border-color:var(--accent);color:var(--accent-l)">REVIEW</span>';
  else if (isSaved) badge = '<span class="saved-badge">SAVED</span>';

  const actions = isPending ? `
    <div class="action-row">
      <button class="action-btn keep" onclick="keepAnalogy(${idx})">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2 8 L6 12 L14 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>
        KEEP IT
      </button>
      <button class="action-btn regen" onclick="regenAnalogy(${idx})">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M13 3 A6 6 0 1 0 14 9" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="square"/><path d="M13 3 L13 7 L9 5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="square"/></svg>
        TRY AGAIN
      </button>
      <button class="action-btn discard" onclick="discardAnalogy(${idx})">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 3 L13 13 M13 3 L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>
        DISCARD
      </button>
    </div>` : `
    <button class="copy-btn" onclick="copyMd(event,${idx})">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="5" y="5" width="9" height="9" stroke="currentColor" stroke-width="1.5"/><path d="M3 11 L3 2 L12 2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      COPY MARKDOWN
    </button>`;

  const pendingNotice = isPending ? '<div class="pending-notice">REVIEW THIS ANALOGY BEFORE SAVING</div>' : '';

  return `
  <div class="${cls}" id="card-${idx}">
    <div class="card-header" onclick="toggle(${idx})" role="button" aria-expanded="false">
      <div class="card-icon">${ICONS[a.iconKey] || ICONS.generated}</div>
      <div class="card-meta">
        <div class="card-title">${a.title}${badge}</div>
        <div class="card-sub">${a.sub}${a.concept ? ' <span style="color:var(--faint);letter-spacing:0.06em">// ' + a.concept.toUpperCase() + '</span>' : ''}</div>
      </div>
      <svg class="chevron" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M6 4 L10 8 L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
      </svg>
    </div>
    <div class="card-body">
      ${pendingNotice}
      <ul class="analogy-list">
        ${a.items.map(it => `<li><span class="item-label">${it.label}</span><span class="item-text">${it.text}</span></li>`).join('')}
      </ul>
      <div class="callout">
        <div class="callout-label">// KEY INSIGHT</div>
        <div class="callout-text">${a.insight}</div>
      </div>
      <div class="tag-row">${a.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="eli5-block" id="eli5-block-${idx}">
        <div class="eli5-header">
          <span class="eli5-label">// ELI5 — EXPLAIN LIKE I'M 5</span>
          <button class="eli5-toggle" onclick="toggleEli5(${idx})">[ HIDE ]</button>
        </div>
        <div class="eli5-content" id="eli5-content-${idx}"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:1rem;">
        ${isPending ? `
        <button class="action-btn keep" onclick="keepAnalogy(${idx})">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2 8 L6 12 L14 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>
          KEEP IT
        </button>` : ''}
        <button class="eli5-btn" id="eli5-btn-${idx}" onclick="generateEli5(${idx})">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><line x1="8" y1="5" x2="8" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/><line x1="8" y1="10" x2="8" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>
          ELI5
        </button>
        ${isPending ? `
        <button class="action-btn regen" onclick="regenAnalogy(${idx})">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M13 3 A6 6 0 1 0 14 9" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="square"/><path d="M13 3 L13 7 L9 5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="square"/></svg>
          TRY AGAIN
        </button>
        <button class="action-btn discard" onclick="discardAnalogy(${idx})">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 3 L13 13 M13 3 L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg>
          DISCARD
        </button>` : `
        <button class="copy-btn" onclick="copyMd(event,${idx})">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="5" y="5" width="9" height="9" stroke="currentColor" stroke-width="1.5"/><path d="M3 11 L3 2 L12 2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          COPY MARKDOWN
        </button>`}
      </div>
    </div>
  </div>`;
}

function buildCards(filter) {
  const container = document.getElementById('cards');
  const list = filter === 'all' ? allAnalogies : allAnalogies.filter(a => a.filters.includes(filter));
  container.innerHTML = list.map(a => cardHTML(a, allAnalogies.indexOf(a))).join('');
}

async function keepAnalogy(idx) {
  const a = allAnalogies[idx];
  a.pending = false;
  a.saved = true;
  pendingAnalogy = null;
  pendingConcept = null;
  savedAnalogies = savedAnalogies.filter(s => s.title !== a.title);
  savedAnalogies.unshift(a);
  await persistSaved(savedAnalogies);
  updateCounts();
  buildCards(activeFilter);
  document.getElementById('deck-label').textContent = 'SELECT ENTRY TO EXPAND — ANALOGY SAVED';
}

async function regenAnalogy(idx) {
  const concept = pendingConcept;
  allAnalogies.splice(idx, 1);
  pendingAnalogy = null;
  buildCards(activeFilter);
  if (concept) {
    document.getElementById('concept-input').value = concept;
    generateAnalogy();
  }
}

function discardAnalogy(idx) {
  allAnalogies.splice(idx, 1);
  pendingAnalogy = null;
  pendingConcept = null;
  updateCounts();
  buildCards(activeFilter);
  document.getElementById('deck-label').textContent = 'SELECT ENTRY TO EXPAND';
}

function toggle(i) {
  const card = document.getElementById('card-' + i);
  if (card) card.classList.toggle('open');
}

function copyMd(e, i) {
  const btn = e.currentTarget;
  const a = allAnalogies[i];
  const md = '## ' + a.title + ' — ' + a.sub + '\n\n' + a.items.map(it => '- **' + it.label + '** ' + it.text).join('\n') + '\n\n> **Key insight:** ' + a.insight + '\n\nTags: ' + a.tags.join(' ');
  navigator.clipboard.writeText(md).then(() => {
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2 8 L6 12 L14 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg> COPIED';
    btn.classList.add('ok');
    setTimeout(() => {
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="5" y="5" width="9" height="9" stroke="currentColor" stroke-width="1.5"/><path d="M3 11 L3 2 L12 2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg> COPY MARKDOWN';
      btn.classList.remove('ok');
    }, 2000);
  });
}

function fillAndGenerate(text) {
  document.getElementById('concept-input').value = text;
  generateAnalogy();
}

async function generateEli5(idx) {
  const a = allAnalogies[idx];
  const btn = document.getElementById('eli5-btn-' + idx);
  const block = document.getElementById('eli5-block-' + idx);
  const contentEl = document.getElementById('eli5-content-' + idx);

  // If already generated, just toggle
  if (a.eli5) {
    block.classList.add('visible');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = `<span class="eli5-dots"><span></span><span></span><span></span></span> THINKING...`;

  const analogyText = a.items.map(it => it.label + ' ' + it.text).join('. ');
  const prompt = `Explain the AI concept behind this analogy in the simplest possible way — as if explaining to a 5-year-old or someone with zero technical knowledge. Use everyday language, a very short story or scenario, and no jargon whatsoever. Keep it to 3-4 sentences max. Be warm and playful.

The analogy is: "${a.title} — ${a.sub}". Key mappings: ${analogyText}. Core insight: ${a.insight}

Respond with ONLY the plain text explanation, no labels, no formatting.`;

  try {
    const response = await fetch('https://royal-butterfly-6c97-aiedagen.pavlovic-sebastian.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 300,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('').trim();
    a.eli5 = text;
    contentEl.textContent = text;
    block.classList.add('visible');
    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><line x1="8" y1="5" x2="8" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/><line x1="8" y1="10" x2="8" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/></svg> ELI5`;
    btn.disabled = false;
  } catch(err) {
    btn.innerHTML = '// ERROR — TRY AGAIN';
    btn.disabled = false;
  }
}

function toggleEli5(idx) {
  const block = document.getElementById('eli5-block-' + idx);
  const btn = document.getElementById('eli5-btn-' + idx);
  if (block.classList.contains('visible')) {
    block.classList.remove('visible');
    if (btn) btn.style.display = 'inline-flex';
  } else {
    block.classList.add('visible');
  }
}

async function generateAnalogy() {
  const input = document.getElementById('concept-input');
  const concept = input.value.trim();
  if (!concept) { input.focus(); return; }

  const btn = document.getElementById('generate-btn');
  const genCard = document.getElementById('generating-card');
  const errCard = document.getElementById('error-card');

  btn.disabled = true;
  errCard.style.display = 'none';
  genCard.style.display = 'block';
  document.getElementById('generating-concept').textContent = '// ' + concept.toUpperCase();

  const existingNames = allAnalogies.map(a => a.title).join(', ');

  const prompt = `You are an expert at explaining AI concepts through vivid, memorable analogies.

First, decide if "${concept}" is genuinely an AI or machine learning concept. If it is NOT related to AI, ML, or data science, respond with exactly this JSON and nothing else:
{"reject": true, "reason": "one sentence explaining this is not an AI concept"}

If it IS an AI concept, create a NEW analogy for it. Existing analogies already cover: ${existingNames}. Choose a fresh metaphor not already used.

Respond ONLY with a valid JSON object. No markdown backticks, no preamble, no explanation. Use exactly this structure:
{
  "title": "METAPHOR NAME (2-3 words, ALL CAPS)",
  "sub": "One-line description of what this analogy explains",
  "filters": ["pick one or more: fundamentals, llm, training, safety"],
  "items": [
    {"label": "AI TERM (ALL CAPS, 1-3 words)", "text": "is/are the analogy part — what it maps to and why."},
    {"label": "AI TERM", "text": "..."},
    {"label": "AI TERM", "text": "..."},
    {"label": "AI TERM", "text": "..."},
    {"label": "AI TERM", "text": "..."}
  ],
  "insight": "A single sharp sentence revealing the non-obvious truth this analogy exposes.",
  "tags": ["#ai/concept-slug", "#ai/analogies"]
}

Rules:
- Exactly 4-6 items
- Each item.text starts with "is" or "are"
- The metaphor must be concrete and universally recognizable
- insight must be genuinely surprising or counterintuitive, not a restatement
- tags: include relevant slug(s) for the concept`;

  try {
    const response = await fetch('https://royal-butterfly-6c97-aiedagen.pavlovic-sebastian.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    if (parsed.reject) {
      genCard.style.display = 'none';
      errCard.style.display = 'block';
      errCard.textContent = '// NOT AN AI CONCEPT — ' + parsed.reason;
      btn.disabled = false;
      return;
    }

    const allIconKeys = Object.keys(ICONS);
    const usedIcons = allAnalogies.map(a => a.iconKey);
    const unused = allIconKeys.filter(k => k !== 'generated' && !usedIcons.includes(k));
    const iconKey = unused.length > 0 ? unused[0] : 'generated';

    const newAnalogy = {
      iconKey,
      title: parsed.title || concept.toUpperCase(),
      sub: parsed.sub || 'Generated analogy',
      filters: Array.isArray(parsed.filters) ? parsed.filters : ['fundamentals'],
      items: Array.isArray(parsed.items) ? parsed.items : [],
      insight: parsed.insight || '',
      tags: Array.isArray(parsed.tags) ? parsed.tags : ['#ai/analogies'],
      generated: true,
      concept: concept
    };

    newAnalogy.pending = true;
    pendingAnalogy = newAnalogy;
    pendingConcept = concept;
    allAnalogies.unshift(newAnalogy);
    genCard.style.display = 'none';
    btn.disabled = false;
    input.value = '';
    updateCounts();
    buildCards(activeFilter);
    document.getElementById('deck-label').textContent = 'SELECT ENTRY TO EXPAND — REVIEW ANALOGY AT TOP';

    const firstCard = document.getElementById('card-0');
    if (firstCard) {
      firstCard.classList.add('open');
      firstCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  } catch (err) {
    genCard.style.display = 'none';
    errCard.style.display = 'block';
    errCard.textContent = '// ERROR — Failed to generate analogy. Check your connection and try again. (' + err.message + ')';
    btn.disabled = false;
  }
}

document.getElementById('concept-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') generateAnalogy();
});

document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    buildCards(activeFilter);
  });
});

async function init() {
  savedAnalogies = await loadSaved();
  if (savedAnalogies.length > 0) {
    allAnalogies = [...baseAnalogies];
    savedAnalogies.forEach(s => {
      if (!allAnalogies.find(a => a.title === s.title)) {
        allAnalogies.unshift(s);
      }
    });
  }
  buildCards('all');
  updateCounts();
  if (savedAnalogies.length > 0) {
    document.getElementById('deck-label').textContent = 'SELECT ENTRY TO EXPAND — ' + savedAnalogies.length + ' SAVED ANALOGI' + (savedAnalogies.length === 1 ? 'Y' : 'ES') + ' LOADED';
  }
}

init();
</script>
